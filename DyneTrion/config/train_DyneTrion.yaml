# Default or base configuration for SE(3) diffusion experiments.

defaults:
  - override hydra/launcher: basic

data:
  ref_number: 0   # No reference frames for seq->structure model
  motion_number: 0  # No motion frames for seq->structure model
  frame_time: 1   # Single frame for seq->structure prediction
  frame_sample_step: 1 # random  select start index first and  split data with steps

  stage1: False
  time_norm: False
  step_split: null            # Split data into steps and randomly select a start index.
  fix_sample_start: null      # Sample starting from a fixed index (fix_sample_start).
  random_sample_train: False  # If True, samples are random; otherwise, sample windows do not overlap.
  train_reference_mode: contiguous
  split_percent: 0.7          # Percentage of data used for extrapolation.
  keep_first: null            # Keep the first N time sequences.
  dynamics: True
  eval_start_idx: 0           # start index for ref evaluation
  eval_end_idx: 10            # end index for ref evaluation
  cfg_drop_rate: 0.1
  csv_path: ../datasets/inference/inference_data.csv # train data path
  val_csv_path:  ../datasets/inference/inference_data.csv # val data path
  filtering:
    train_max_len: 2048
    val_max_len: 600
  crop:
    enabled: true
    crop_size: 384
    spatial_crop_prob: 0.5
    interface_threshold: 8.0
  min_t: 0.01
  num_t: 100 # linespace for reverse diffuser for 0 to 1

diffuser:
  dynamics: ${data.dynamics}
  frame_time: ${data.frame_time}  # =1 for seq->structure
  diffuse_trans: True
  diffuse_rot: True

  # R(3) diffuser arguments
  r3:
    min_b: 0.1
    max_b: 20.0
    coordinate_scaling: 0.1

  # SO(3) diffuser arguments
  so3:
    num_omega: 1000
    num_sigma: 1000
    min_sigma: 0.1
    max_sigma: 1.5
    schedule: logarithmic
    cache_dir: .cache/
    use_cached_score: False

model:
  fp16: False
  cfg_drop_rate: 0.0
  cfg_drop_in_train: True
  cfg_gamma: 3.5 # from 1 to 7.5
  frame_time: ${data.frame_time}  # =1 for seq->structure
  ref_number: ${data.ref_number}   # =0 for seq->structure
  motion_number: ${data.motion_number}  # =0 for seq->structure

  dirtect: False   # seq to temporal structure
  dynamics: ${data.dynamics}
  node_input_embed_size: 384
  node_embed_size: 256
  edge_embed_size: 128
  dropout: 0.0
  multimer:
    enabled: true
  embed:
    DFOLDv2_embedder: True
    index_embed_size:  32  # 32 for scratch   64 for fine-tuning model
    aatype_embed_size: 32 # default 64
    embed_self_conditioning: True
    num_bins: 22
    min_bin: 1e-5
    max_bin: 20.0
    skip_feature: False
  ipa:
    c_s: ${model.node_embed_size}
    c_z: ${model.edge_embed_size}
    c_hidden: 256 # default 256
    c_skip: 64
    no_heads: 8 # default 8
    no_qk_points: 8  # default 8
    no_v_points: 12  # default 12
    seq_tfmr_num_heads: 4
    seq_tfmr_num_layers: 2 # should be 2 if load pretrained model from 30D_04M_2024Y_20h_32m_00s
    num_blocks: 4
    coordinate_scaling: ${diffuser.r3.coordinate_scaling}
    spatial: True
    temporal: False  # Disabled for seq->structure model (no temporal components)
    temporal_position_encoding: False  # Disabled for seq->structure model
    temporal_position_max_len: 130
    frozen_spatial: False
    gradient_checkpointing: False  # Enable to reduce memory (trade compute)

experiment:
  # Experiment metadata
  project: DyneTrion
  name: diffusion
  base_root: ./debug
  run_id: null
  training: True

  #training mode
  use_ddp : True

  # Training arguments
  log_freq: 100
  batch_size: 1
  eval_batch_size: 1
  num_loader_workers: 5
  num_epoch: 300_000 #500
  learning_rate: 0.0001
  max_squared_res: 360000
  prefetch_factor: 100
  use_gpu: True
  enable_torch_compile: False
  num_gpus: 4
  enable_validation: False
  # sample_mode: cluster_time_batch

  # board logging
  use_recoder: True
  recoder:
    save_path: ${experiment.base_root}/${experiment.project}/${experiment.name}/swanlab/
    mode: local
    api_key: ''

  # How many steps to checkpoint between.
  ckpt_freq: 1000
  # Take early checkpoint at step 100. Helpful for catching eval bugs early.
  early_ckpt: True


  ckpt_dir: ${experiment.base_root}/${experiment.project}/${experiment.name}/ckpt/
  use_warm_start_conf: False #True
  warm_start: /inspire/ssd/project/sais-bio/public/caizhiqiang/DyneTrion/train_log/DyneTrion_1ns/frame16_motion2_sample_step100/ckpt/14D_01M_2026Y_12h_12m_02s/step_100000.pth
  reuse_step: False

  rot_loss_weight: 1.0
  rot_loss_t_threshold: 0.0
  separate_rot_loss: False

  trans_loss_weight: 1.0
  trans_x0_threshold: 1.0

  velocity_loss_weight: 0.0
  velocity_loss_t_filter: 0.5

  torsion_loss_weight: 1.0

  coordinate_scaling: ${diffuser.r3.coordinate_scaling}
  aux_loss_weight: 0.25

  bb_atom_loss_weight: 1.0
  bb_atom_loss_t_filter: 0.25

  dist_mat_loss_weight: 1.0
  dist_mat_loss_t_filter: 0.25

  # ===== Multimer losses (interface / clash) =====
  interface_dist_loss_weight: 0.1
  interface_dist_cutoff: 8.0

  chain_clash_loss_weight: 0.0
  chain_clash_ca_threshold: 2.0

  chain_com_loss_weight: 0.0
  chain_com_margin: 1.0

  # validation dir.
  eval_dir: ${experiment.base_root}/${experiment.project}/${experiment.name}/val_outputs/
  noise_scale: 1.0
  # Filled in during training.
  num_parameters: null
  trainable_num_parameters: null

hydra:
  run:
    dir: ${experiment.base_root}/${experiment.project}/${experiment.name}/log/${now:%Y-%m-%d}/${now:%H-%M-%S}
